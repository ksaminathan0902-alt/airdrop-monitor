name: Airdrop Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # runs every 30 minutes, 24/7
  workflow_dispatch:           # lets you run it manually anytime

jobs:
  check-airdrops:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run airdrop checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_actions.py

      - name: Save state back to repo
        run: |
          git config user.email "airdrop-bot@github.com"
          git config user.name  "Airdrop Bot"
          git add seen_airdrops.json
          git diff --staged --quiet || git commit -m "chore: update seen airdrops"
          git push
